apiVersion: apps/v1
kind: Deployment
metadata:
  name: myapp
spec:
  replicas: 1   # default
  selector:
    matchLabels:
      app: myapp
  template:
    metadata:
      labels:
        app: myapp
    spec:
      containers:
        - name: myapp
          image: shivawmm1810/myapp:initial
          imagepullpolicy: Always
          ports:
            - containerPort: 5000
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"