apiVersion: apps/v1
kind: Deployment
metadata:
  name: myapp
spec:
  replicas: 1   # default
  selector:
    matchLabels:
      app: myapp
  template:
    metadata:
      labels:
        app: myapp
    spec:
      containers:
        - name: myapp
          image: shivawmm1810/myapp:2.0
          ports:
            - containerPort: 5000